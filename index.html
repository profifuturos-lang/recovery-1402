<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA RECOVERY 1402</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .card-task { background: #111; border: 1px solid #222; border-radius: 12px; margin-bottom: 15px; padding: 20px; }
        .btn-green { background: #22c55e; color: #000; font-weight: bold; width: 100%; padding: 12px; border-radius: 8px; }
        .btn-gray { background: #333; color: #777; width: 100%; padding: 12px; border-radius: 8px; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyD-qTf1qCOc-JEPCCd50OXDUwcbCcN4HBY",
            authDomain: "recovery-wsp.firebaseapp.com",
            databaseURL: "https://recovery-wsp-default-rtdb.firebaseio.com",
            projectId: "recovery-wsp",
            storageBucket: "recovery-wsp.firebasestorage.app",
            messagingSenderId: "406896497225",
            appId: "1:406896497225:web:ca25dd75b11e0f386c2598"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function App() {
            const [tasks, setTasks] = React.useState([]);
            const [isAdmin, setIsAdmin] = React.useState(false);
            const [pass, setPass] = React.useState('');
            const [phone, setPhone] = React.useState('');
            const [msg, setMsg] = React.useState('');

            React.useEffect(() => {
                const tasksRef = db.ref('tasks');
                tasksRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const list = Object.keys(data).map(id => ({ id, ...data[id] }));
                        setTasks(list.reverse());
                    } else { setTasks([]); }
                });
            }, []);

            const addTask = (e) => {
                e.preventDefault();
                db.ref('tasks').push({
                    phone: phone.replace(/\D/g, ''),
                    message: msg,
                    status: 'DISPONIBLE'
                });
                setPhone(''); setMsg('');
            };

            const executeTask = (task) => {
                if (task.status === 'COMPLETADO') return;
                window.open(`https://wa.me/${task.phone}?text=${encodeURIComponent(task.message)}`, '_blank');
                db.ref('tasks/' + task.id).update({ status: 'COMPLETADO' });
            };

            return (
                <div className="max-w-md mx-auto p-4">
                    <div className="flex justify-between items-center my-6">
                        <h1 className="text-xl font-bold">RECOVERY_1402</h1>
                        <button onClick={() => setIsAdmin(!isAdmin)} className="text-xs text-gray-500">ADMIN</button>
                    </div>

                    {isAdmin && (
                        <div className="bg-zinc-900 p-4 rounded-xl mb-8 border border-zinc-800">
                            {pass !== 'PERRA' ? (
                                <input type="password" placeholder="CLAVE" className="w-full bg-black p-2 border border-zinc-700 text-center" onChange={e => setPass(e.target.value.toUpperCase())} />
                            ) : (
                                <form onSubmit={addTask} className="flex flex-col gap-2">
                                    <input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="Número" className="bg-black p-2 border border-zinc-700" />
                                    <textarea value={msg} onChange={e=>setMsg(e.target.value)} placeholder="Mensaje" className="bg-black p-2 border border-zinc-700 h-20" />
                                    <button className="bg-white text-black font-bold p-2">AÑADIR A LA LISTA</button>
                                </form>
                            )}
                        </div>
                    )}

                    <div>
                        {tasks.map(t => (
                            <div key={t.id} className="card-task">
                                <div className="flex justify-between mb-2">
                                    <span className="text-xs font-bold text-gray-500 uppercase">{t.status}</span>
                                    {isAdmin && pass === 'PERRA' && <button onClick={() => db.ref('tasks/'+t.id).remove()} className="text-red-900 text-xs">ELIMINAR</button>}
                                </div>
                                <p className="text-sm text-gray-300 mb-4 italic">"{t.message}"</p>
                                <button 
                                    onClick={() => executeTask(t)} 
                                    className={t.status === 'COMPLETADO' ? 'btn-gray' : 'btn-green'}
                                    disabled={t.status === 'COMPLETADO'}
                                >
                                    {t.status === 'COMPLETADO' ? 'ENVIADO' : 'ENVIAR POR WHATSAPP'}
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
