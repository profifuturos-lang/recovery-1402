<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Task Manager - Single Use</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #f4f4f5; margin: 0; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(39, 39, 42, 0.5); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyD-qTf1qCOc-JEPCCd50OXDUwcbCcN4HBY",
            authDomain: "recovery-wsp.firebaseapp.com",
            databaseURL: "https://recovery-wsp-default-rtdb.firebaseio.com",
            projectId: "recovery-wsp",
            storageBucket: "recovery-wsp.firebasestorage.app",
            messagingSenderId: "406896497225",
            appId: "1:406896497225:web:ca25dd75b11e0f386c2598"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const Icons = {
            MessageSquare: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
            Plus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            LogIn: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>,
            X: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Play: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            Trash2: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            CheckCircle: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            Lock: () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        };

        function App() {
            const [tasks, setTasks] = useState([]);
            const [isAdminOpen, setIsAdminOpen] = useState(false);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [hasCompletedTask, setHasCompletedTask] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            const [phone, setPhone] = useState('');
            const [message, setMessage] = useState('');

            useEffect(() => {
                // Verificar si ya completó una tarea (Solo para no-admins)
                const done = localStorage.getItem('task_done_ronald');
                if (done === 'true') setHasCompletedTask(true);

                const tasksRef = db.ref('tasks');
                tasksRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const list = Object.keys(data).map(id => ({ id, ...data[id] }));
                        setTasks(list);
                    } else { setTasks([]); }
                });
                return () => tasksRef.off();
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                if (adminPassword.toUpperCase() === 'PERRA') { 
                    setIsAuthenticated(true); 
                    setAdminPassword(''); 
                    setHasCompletedTask(false); // El admin siempre ve todo
                }
                else alert('Contraseña incorrecta');
            };

            const addTask = (e) => {
                e.preventDefault();
                const newTask = { phone: phone.replace(/\D/g, ''), message, status: 'DISPONIBLE', createdAt: Date.now() };
                db.ref('tasks').push(newTask);
                setPhone(''); setMessage('');
            };

            const executeTask = (task) => {
                if (task.status === 'COMPLETADO') return;
                window.open(`https://wa.me/${task.phone}?text=${encodeURIComponent(task.message)}`, '_blank');
                db.ref('tasks/' + task.id).update({ status: 'COMPLETADO' });
                
                // Bloquear al usuario si NO es admin
                if (!isAuthenticated) {
                    localStorage.setItem('task_done_ronald', 'true');
                    setHasCompletedTask(true);
                }
            };

            const deleteTask = (id) => { if(confirm("¿Eliminar?")) db.ref('tasks/' + id).remove(); };

            // PANTALLA DE BLOQUEO SI YA CUMPLIÓ
            if (hasCompletedTask && !isAuthenticated) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                        <div className="mb-6 animate-bounce"><Icons.Lock /></div>
                        <h1 className="text-2xl font-bold text-emerald-500 mb-2">¡Tarea Completada!</h1>
                        <p className="text-zinc-500 max-w-xs">Ya has realizado tu tarea asignada. Gracias por tu participación en el sistema.</p>
                        <button onClick={() => setIsAdminOpen(true)} className="mt-8 text-zinc-800 text-xs underline">Acceso Sistema</button>
                        
                        {isAdminOpen && (
                            <div className="mt-4 w-full max-w-xs">
                                <form onSubmit={handleLogin} className="space-y-2">
                                    <input type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} placeholder="PIN Admin" className="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-2 text-center outline-none focus:border-emerald-500"/>
                                    <button className="w-full bg-emerald-500 text-black font-bold py-2 rounded-lg">Desbloquear Panel</button>
                                </form>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <header className="sticky top-0 z-50 border-b border-zinc-800/50 bg-black/80 backdrop-blur-md h-16 flex items-center justify-between px-4 max-w-5xl mx-auto w-full">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center"><Icons.MessageSquare /></div>
                            <h1 className="text-lg font-bold">WA Task Manager</h1>
                        </div>
                        <button onClick={() => setIsAdminOpen(!isAdminOpen)} className="flex items-center gap-2 px-4 py-2 rounded-full bg-zinc-900 border border-zinc-800 text-sm italic">
                            {isAdminOpen ? 'Cerrar' : 'Admin'}
                        </button>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-8">
                        {isAdminOpen && (
                            <div className="mb-12 p-6 rounded-2xl glass shadow-2xl">
                                {!isAuthenticated ? (
                                    <form onSubmit={handleLogin} className="max-w-sm mx-auto text-center space-y-4 py-4">
                                        <h2 className="text-lg font-semibold text-emerald-500">Panel Maestro</h2>
                                        <input type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} placeholder="Contraseña" className="w-full bg-black border border-zinc-800 rounded-xl px-4 py-2.5 outline-none text-center focus:border-emerald-500" required />
                                        <button className="w-full bg-white text-black font-bold py-2.5 rounded-xl">Entrar</button>
                                    </form>
                                ) : (
                                    <form onSubmit={addTask} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <input value={phone} onChange={e => setPhone(e.target.value)} placeholder="Número destino" className="bg-black border border-zinc-800 rounded-xl px-4 py-3 outline-none focus:border-emerald-500" required />
                                        <textarea value={message} onChange={e => setMessage(e.target.value)} placeholder="Mensaje..." className="bg-black border border-zinc-800 rounded-xl px-4 py-3 outline-none h-12 resize-none focus:border-emerald-500" required />
                                        <button className="md:col-span-2 bg-emerald-500 text-black font-bold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-emerald-400 transition-colors"><Icons.Plus /> Agregar Nueva Tarea</button>
                                    </form>
                                )}
                            </div>
                        )}

                        <div className="space-y-12">
                            <Section title="Tareas Disponibles" count={tasks.filter(t => t.status === 'DISPONIBLE').length} color="emerald">
                                {tasks.filter(t => t.status === 'DISPONIBLE')
                                      .sort((a,b) => b.createdAt - a.createdAt)
                                      .map(t => <TaskCard key={t.id} task={t} onExecute={executeTask} onDelete={deleteTask} isAdmin={isAuthenticated} />)}
                            </Section>
                            
                            {/* Solo el admin ve el historial de completadas para no confundir al trabajador */}
                            {isAuthenticated && (
                                <Section title="Historial (Solo Admin)" count={tasks.filter(t => t.status === 'COMPLETADO').length} color="zinc">
                                    {tasks.filter(t => t.status === 'COMPLETADO')
                                          .sort((a,b) => b.createdAt - a.createdAt)
                                          .map(t => <TaskCard key={t.id} task={t} onExecute={executeTask} onDelete={deleteTask} isAdmin={isAuthenticated} isDone />)}
                                </Section>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        function Section({ title, count, color, children }) {
            return (
                <div>
                    <div className="flex items-center justify-between mb-6">
                        <h2 className={`text-xl font-bold ${color === 'zinc' ? 'text-zinc-600' : 'text-emerald-500'}`}>{title}</h2>
                        <span className={`text-[10px] font-bold px-2 py-1 rounded ${color === 'zinc' ? 'bg-zinc-900 text-zinc-500' : 'bg-emerald-500/10 text-emerald-500'}`}>{count}</span>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">{count === 0 ? <p className="col-span-full text-zinc-800 text-center py-12 border border-dashed border-zinc-900 rounded-2xl italic">Sin tareas pendientes</p> : children}</div>
                </div>
            );
        }

        function TaskCard({ task, onExecute, onDelete, isAdmin, isDone }) {
            return (
                <div className={`group relative p-5 rounded-2xl border transition-all duration-300 ${isDone ? 'border-zinc-900 bg-zinc-900/10 opacity-40' : 'border-zinc-800 bg-zinc-900/40 hover:border-emerald-500/30 shadow-lg'}`}>
                    <div className="flex justify-between items-start mb-4">
                        <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${isDone ? 'bg-zinc-800 text-zinc-500' : 'bg-emerald-500/10 text-emerald-500'}`}>{isDone ? 'FINALIZADA' : 'DISPONIBLE'}</span>
                        {isAdmin && <button onClick={() => onDelete(task.id)} className="text-zinc-700 hover:text-red-500 transition-colors"><Icons.Trash2 /></button>}
                    </div>
                    
                    {isAdmin ? (
                        <div className="mb-6">
                            <p className="text-[10px] text-zinc-500 mb-1">Para: {task.phone}</p>
                            <p className="text-sm text-zinc-300 italic">"{task.message}"</p>
                        </div>
                    ) : (
                        <p className="text-[10px] font-mono text-zinc-600 mb-6 tracking-widest">[ CONTENIDO PROTEGIDO ]</p>
                    )}

                    <button 
                        onClick={() => onExecute(task)} 
                        disabled={isDone}
                        className={`w-full py-4 rounded-xl font-bold text-xs flex items-center justify-center gap-2 transition-all ${isDone ? 'bg-zinc-800 text-zinc-600 cursor-not-allowed' : 'bg-emerald-500 text-black shadow-lg hover:bg-emerald-400'}`}
                    >
                        {isDone ? <Icons.CheckCircle /> : <Icons.Play />} {isDone ? 'TAREA ENVIADA' : 'REALIZAR TAREA'}
                    </button>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
